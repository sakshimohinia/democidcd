apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: springboot-app

  template:
    metadata:
      labels:
        app: springboot-app

    spec:
      containers:
      - name: springboot-app
        image: springboot-app
        ports:
        - containerPort: 8080